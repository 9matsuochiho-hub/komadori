<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>コマドリ — 手描きコマアニメ</title>
<meta name="theme-color" content="#16181d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="コマドリ">
<link rel="icon" href="./icon-192.png">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icon-180.png">
<style>
  :root{
    --ink:#16181d;
    --panel:#22262e;
    --panel-2:#2b303a;
    --line:#39404c;
    --text:#e6e9ee;
    --muted:#8d95a3;
    --accent:#57c7b7;
    --prev:#e35b4a;
    --next:#4a8ee3;
    --mono: ui-monospace, "SF Mono", Menlo, monospace;
    --ui: -apple-system, "Hiragino Sans", "Hiragino Kaku Gothic ProN", system-ui, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; overflow:hidden; overscroll-behavior:none;}
  body{
    background:var(--ink); color:var(--text); font-family:var(--ui);
    -webkit-user-select:none; user-select:none; -webkit-touch-callout:none;
    touch-action:manipulation;
  }
  #app{
    height:100dvh; display:flex; flex-direction:column;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /* ---- top bar ---- */
  #topbar{
    height:46px; flex:0 0 auto; display:flex; align-items:center; gap:6px;
    padding:0 10px; background:var(--panel); border-bottom:1px solid var(--line);
    overflow-x:auto; white-space:nowrap;
  }
  .btn, .brand{flex:0 0 auto}
  .brand{font-size:13px; letter-spacing:.14em; color:var(--muted); margin-right:4px;}
  @media (max-width: 860px){ .brand{display:none} .fps input{width:70px} }
  .spacer{flex:1}
  .btn{
    height:32px; min-width:32px; padding:0 10px; border:1px solid var(--line);
    background:var(--panel-2); color:var(--text); border-radius:8px;
    font-size:13px; font-family:var(--ui); display:inline-flex; align-items:center;
    justify-content:center; gap:5px; cursor:pointer;
  }
  .btn:active{background:#3a4150}
  .btn[disabled]{opacity:.35}
  .btn.on{background:var(--accent); border-color:var(--accent); color:#0e1418; font-weight:600}
  .btn.wide{padding:0 14px}
  .fps{display:flex; flex:0 0 auto; align-items:center; gap:8px; padding:0 8px; color:var(--muted); font-size:12px}
  .fps input{width:110px}
  input[type=range]{accent-color:var(--accent)}
  .fps b{font-family:var(--mono); color:var(--text); font-size:13px; width:34px; text-align:right}

  /* ---- middle ---- */
  #middle{flex:1; display:flex; min-height:0}
  #tools{
    width:66px; flex:0 0 auto; background:var(--panel); border-right:1px solid var(--line);
    display:flex; flex-direction:column; align-items:center; gap:8px; padding:8px 0; overflow-y:auto;
  }
  .tbtn{
    width:46px; height:40px; border:1px solid var(--line); background:var(--panel-2);
    border-radius:9px; color:var(--text); font-size:11px; display:flex; align-items:center;
    justify-content:center; cursor:pointer;
  }
  .tbtn.on{background:var(--accent); border-color:var(--accent); color:#0e1418}
  .tbtn svg{width:20px; height:20px; fill:none; stroke:currentColor; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round}
  .lbl{font-size:10px; color:var(--muted); letter-spacing:.08em; white-space:nowrap}
  /* 縦スライダー: 新しいSafariは writing-mode、古いSafariは -webkit-appearance */
  #size{width:46px; height:110px; -webkit-appearance:slider-vertical; writing-mode:vertical-lr; direction:rtl; accent-color:var(--accent)}
  #sizeVal{font-family:var(--mono); font-size:11px; color:var(--muted)}
  #swatches{display:grid; grid-template-columns:repeat(2,1fr); gap:5px; padding:0 8px; width:100%}
  .sw{aspect-ratio:1; border-radius:50%; border:2px solid transparent; box-shadow:0 0 0 1px #0006 inset}
  .sw.on{border-color:var(--accent)}
  #custom{width:50px; height:26px; border:1px solid var(--line); border-radius:6px; background:none; padding:1px}

  #stage{flex:1; display:flex; align-items:center; justify-content:center; min-width:0; position:relative; background:
    repeating-conic-gradient(#1b1e24 0% 25%, #191c22 0% 50%) 50%/22px 22px;}
  #wrap{position:relative; background:#fff; box-shadow:0 12px 40px #0009; border-radius:2px; overflow:hidden}
  #wrap canvas{position:absolute; inset:0; width:100%; height:100%; touch-action:none; display:block}
  #onion{opacity:.85}
  #player{background:#fff}
  #player[hidden]{display:none}

  /* ---- filmstrip = timesheet ---- */
  #sheet{
    height:112px; flex:0 0 auto; background:var(--panel); border-top:1px solid var(--line);
    display:flex; align-items:stretch;
  }
  #sheetHead{
    width:74px; flex:0 0 auto; border-right:1px solid var(--line);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
  }
  #sheetHead .lbl{font-size:9px; white-space:nowrap}
  .legend{display:flex; gap:6px; font-size:10px; font-family:var(--mono)}
  .legend i{font-style:normal}
  .legend .p{color:var(--prev)} .legend .n{color:var(--next)}
  #strip{flex:1; display:flex; gap:8px; align-items:center; overflow-x:auto; padding:8px 10px; -webkit-overflow-scrolling:touch}
  .cell{flex:0 0 auto; width:104px; cursor:pointer; position:relative}
  .cell canvas{width:104px; height:58.5px; background:#fff; border-radius:3px; border:1px solid var(--line); display:block}
  .cell.on canvas{border-color:var(--accent); box-shadow:0 0 0 2px var(--accent)}
  .cell .no{
    font-family:var(--mono); font-size:10px; color:var(--muted); text-align:center; padding-top:3px;
    letter-spacing:.06em;
  }
  .cell.on .no{color:var(--accent)}
  #sheetTail{
    flex:0 0 auto; border-left:1px solid var(--line); padding:8px;
    display:grid; grid-template-columns:repeat(3,40px); grid-auto-rows:40px; gap:6px; align-content:center;
  }
  #sheetTail .tbtn{width:40px; height:40px; font-size:13px}

  /* ---- overlays ---- */
  .sheetpop{
    position:fixed; inset:0; background:#000a; display:flex; align-items:center; justify-content:center; z-index:50;
    -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px);
  }
  .sheetpop[hidden]{display:none}
  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:18px;
    width:min(380px, 86vw); display:flex; flex-direction:column; gap:12px;
  }
  .card h2{font-size:15px; font-weight:600; letter-spacing:.04em}
  .card p{font-size:12.5px; color:var(--muted); line-height:1.7}
  .row{display:flex; gap:8px; align-items:center}
  .row select{
    flex:1; height:32px; background:var(--panel-2); color:var(--text);
    border:1px solid var(--line); border-radius:8px; font-size:13px; padding:0 8px;
  }
  #bar{height:4px; background:var(--panel-2); border-radius:3px; overflow:hidden}
  #bar i{display:block; height:100%; width:0%; background:var(--accent); transition:width .15s}
  @media (prefers-reduced-motion: reduce){*{transition:none !important; animation:none !important}}
  :focus-visible{outline:2px solid var(--accent); outline-offset:2px}
</style>
</head>
<body>
<div id="app">

  <header id="topbar">
    <span class="brand">コマドリ</span>
    <button class="btn" id="undo" title="取り消し">↶</button>
    <button class="btn" id="redo" title="やり直し">↷</button>
    <button class="btn wide" id="play">▶ 再生</button>
    <div class="fps">
      <span>fps</span>
      <input type="range" id="fps" min="1" max="24" step="1" value="12">
      <b id="fpsVal">12</b>
    </div>
    <span class="spacer"></span>
    <button class="btn" id="onionBtn">オニオン: 1枚</button>
    <button class="btn" id="pencilOnly">指OK</button>
    <button class="btn wide" id="exportBtn">書き出し</button>
    <button class="btn" id="menuBtn">…</button>
  </header>

  <div id="middle">
    <aside id="tools">
      <button class="tbtn on" id="pen" title="ペン">
        <svg viewBox="0 0 24 24"><path d="M4 20l4-1 10-10-3-3L5 16l-1 4z"/><path d="M14 6l3 3"/></svg>
      </button>
      <button class="tbtn" id="eraser" title="消しゴム">
        <svg viewBox="0 0 24 24"><path d="M8 20h11"/><path d="M15 5l5 5-8 8H7l-3-3 11-10z"/></svg>
      </button>
      <span class="lbl">太さ</span>
      <input type="range" id="size" min="1" max="60" step="1" value="6" orient="vertical">
      <span id="sizeVal">6</span>
      <span class="lbl">色</span>
      <div id="swatches"></div>
      <input type="color" id="custom" value="#1a1a1a">
    </aside>

    <section id="stage">
      <div id="wrap">
        <canvas id="onion"></canvas>
        <canvas id="paper"></canvas>
        <canvas id="player" hidden></canvas>
      </div>
    </section>
  </div>

  <footer id="sheet">
    <div id="sheetHead">
      <span class="lbl">タイムシート</span>
      <div class="legend"><i class="p">●前</i><i class="n">●次</i></div>
      <span class="lbl" id="count">1 コマ</span>
    </div>
    <div id="strip"></div>
    <div id="sheetTail">
      <button class="tbtn" id="add" title="コマを追加">＋</button>
      <button class="tbtn" id="dup" title="コマを複製">⧉</button>
      <button class="tbtn" id="del" title="コマを削除">✕</button>
      <button class="tbtn" id="left" title="左へ動かす">◀</button>
      <button class="tbtn" id="right" title="右へ動かす">▶</button>
    </div>
  </footer>
</div>

<!-- 書き出しダイアログ -->
<div class="sheetpop" id="expPop" hidden>
  <div class="card">
    <h2>書き出し</h2>
    <p>作ったコマを1つのファイルにまとめます。保存先は共有シート、またはダウンロードです。</p>
    <div class="row">
      <span class="lbl">サイズ</span>
      <select id="expScale">
        <option value="0.5" selected>50%（640×360・軽い）</option>
        <option value="1">100%（1280×720）</option>
        <option value="0.25">25%（320×180）</option>
      </select>
    </div>
    <div class="row">
      <button class="btn wide" id="expGif" style="flex:1">GIFで書き出す</button>
      <button class="btn wide" id="expPng" style="flex:1">PNG連番（ZIP）</button>
    </div>
    <div class="row"><button class="btn" id="expClose" style="flex:1">閉じる</button></div>
  </div>
</div>

<!-- メニュー -->
<div class="sheetpop" id="menuPop" hidden>
  <div class="card">
    <h2>メニュー</h2>
    <p>作業内容はこの端末の中（IndexedDB）に自動保存されます。サーバーには何も送りません。</p>
    <button class="btn" id="clearAll">全部消して新規作成</button>
    <button class="btn" id="menuClose">閉じる</button>
  </div>
</div>

<!-- 進捗 -->
<div class="sheetpop" id="progPop" hidden>
  <div class="card">
    <h2 id="progTitle">書き出し中</h2>
    <div id="bar"><i id="barFill"></i></div>
    <p id="progText">準備しています…</p>
  </div>
</div>

<script>
/* =========================================================
   コマドリ — 手描きコマアニメ PWA
   すべて端末内で完結します（外部送信なし）
   ========================================================= */
const W = 1280, H = 720;                 // 作画解像度
const $ = s => document.querySelector(s);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);

const paper  = $('#paper'),  pctx = paper.getContext('2d');
const onion  = $('#onion'),  octx = onion.getContext('2d');
const player = $('#player'), plctx = player.getContext('2d');
[paper, onion, player].forEach(c => { c.width = W; c.height = H; });

const tint = document.createElement('canvas'); tint.width = W; tint.height = H;
const tctx = tint.getContext('2d');

const state = {
  frames: [],            // {id, blob, img}
  cur: 0,
  fps: 12,
  tool: 'pen',
  size: 6,
  color: '#1a1a1a',
  onion: 1,              // 0/1/2
  pencilOnly: false,
  playing: false
};
let undoStack = [], redoStack = [], playTimer = null, db = null;

/* ---------------- IndexedDB ---------------- */
function openDB(){
  return new Promise((res, rej) => {
    const r = indexedDB.open('komadori', 1);
    r.onupgradeneeded = () => {
      const d = r.result;
      if (!d.objectStoreNames.contains('frames')) d.createObjectStore('frames');
      if (!d.objectStoreNames.contains('meta'))   d.createObjectStore('meta');
    };
    r.onsuccess = () => res(r.result);
    r.onerror   = () => rej(r.error);
  });
}
const idbGet = (s, k) => new Promise((res, rej) => {
  const r = db.transaction(s, 'readonly').objectStore(s).get(k);
  r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
});
const idbPut = (s, k, v) => new Promise((res, rej) => {
  const r = db.transaction(s, 'readwrite').objectStore(s).put(v, k);
  r.onsuccess = () => res(); r.onerror = () => rej(r.error);
});
const idbDel = (s, k) => new Promise((res) => {
  const r = db.transaction(s, 'readwrite').objectStore(s).delete(k);
  r.onsuccess = () => res(); r.onerror = () => res();
});
const idbClear = (s) => new Promise((res) => {
  const r = db.transaction(s, 'readwrite').objectStore(s).clear();
  r.onsuccess = () => res(); r.onerror = () => res();
});

let metaTimer = null;
function saveMeta(){
  clearTimeout(metaTimer);
  metaTimer = setTimeout(() => {
    idbPut('meta', 'project', {
      order: state.frames.map(f => f.id),
      cur: state.cur, fps: state.fps, onion: state.onion,
      size: state.size, color: state.color, pencilOnly: state.pencilOnly
    }).catch(()=>{});
  }, 250);
}

async function toImg(blob){
  if (!blob) return null;
  if (window.createImageBitmap) { try { return await createImageBitmap(blob); } catch(e){} }
  return new Promise(res => {
    const i = new Image(), u = URL.createObjectURL(blob);
    i.onload = () => { URL.revokeObjectURL(u); res(i); };
    i.src = u;
  });
}

/* ---------------- 描画キャンバスの表示サイズ ---------------- */
function fit(){
  const r = $('#stage').getBoundingClientRect();
  let w = r.width - 20, h = r.height - 20;
  if (w / h > W / H) w = h * W / H; else h = w * H / W;
  const wrap = $('#wrap');
  wrap.style.width = Math.floor(w) + 'px';
  wrap.style.height = Math.floor(h) + 'px';
}
addEventListener('resize', fit);
addEventListener('orientationchange', () => setTimeout(fit, 300));

/* ---------------- 描画 ---------------- */
let drawing = false, last = null, activeId = null;

function toCanvas(e){
  const r = paper.getBoundingClientRect();
  return { x: (e.clientX - r.left) * (W / r.width), y: (e.clientY - r.top) * (H / r.height) };
}
function widthFor(e){
  if (e.pointerType === 'pen') {
    const p = e.pressure > 0 ? e.pressure : 0.5;
    return Math.max(0.6, state.size * (0.35 + 0.9 * p));
  }
  return state.size;
}
function setBrush(){
  pctx.lineCap = 'round'; pctx.lineJoin = 'round';
  if (state.tool === 'eraser') {
    pctx.globalCompositeOperation = 'destination-out';
    pctx.strokeStyle = 'rgba(0,0,0,1)';
  } else {
    pctx.globalCompositeOperation = 'source-over';
    pctx.strokeStyle = state.color;
  }
}
function segment(a, b, w){
  pctx.lineWidth = w;
  pctx.beginPath(); pctx.moveTo(a.x, a.y); pctx.lineTo(b.x, b.y); pctx.stroke();
}

paper.addEventListener('pointerdown', e => {
  if (state.playing) return;
  if (state.pencilOnly && e.pointerType !== 'pen') return;   // パームリジェクション
  if (activeId !== null) return;
  e.preventDefault();
  activeId = e.pointerId;
  paper.setPointerCapture(e.pointerId);
  drawing = true;
  undoStack.push({ id: state.frames[state.cur].id, blob: state.frames[state.cur].blob });
  if (undoStack.length > 20) undoStack.shift();
  redoStack = [];
  setBrush();
  last = toCanvas(e);
  segment(last, { x: last.x + 0.01, y: last.y }, widthFor(e));   // 点を打つ
});

paper.addEventListener('pointermove', e => {
  if (!drawing || e.pointerId !== activeId) return;
  e.preventDefault();
  const evs = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
  for (const ev of evs) {
    const p = toCanvas(ev);
    segment(last, p, widthFor(ev));
    last = p;
  }
});

function endStroke(e){
  if (!drawing || (e && e.pointerId !== activeId)) return;
  drawing = false; activeId = null; last = null;
  pctx.globalCompositeOperation = 'source-over';
  commit();
  refreshUndo();
}
paper.addEventListener('pointerup', endStroke);
paper.addEventListener('pointercancel', endStroke);

async function commit(){
  const f = state.frames[state.cur];
  const blob = await new Promise(r => paper.toBlob(r, 'image/png'));
  f.blob = blob;
  f.img = await toImg(blob);
  await idbPut('frames', f.id, blob).catch(()=>{});
  drawThumb(state.cur);
  saveMeta();
}

/* ---------------- オニオンスキン ---------------- */
function drawTinted(img, color, alpha){
  tctx.clearRect(0, 0, W, H);
  tctx.globalCompositeOperation = 'source-over';
  tctx.drawImage(img, 0, 0, W, H);
  tctx.globalCompositeOperation = 'source-in';
  tctx.fillStyle = color; tctx.fillRect(0, 0, W, H);
  tctx.globalCompositeOperation = 'source-over';
  octx.globalAlpha = alpha;
  octx.drawImage(tint, 0, 0);
  octx.globalAlpha = 1;
}
function drawOnion(){
  octx.clearRect(0, 0, W, H);
  if (!state.onion) return;
  for (let d = state.onion; d >= 1; d--) {
    const a = 0.42 / d;
    const prev = state.frames[state.cur - d];
    const next = state.frames[state.cur + d];
    if (prev && prev.img) drawTinted(prev.img, getComputedStyle(document.documentElement).getPropertyValue('--prev').trim(), a);
    if (next && next.img) drawTinted(next.img, getComputedStyle(document.documentElement).getPropertyValue('--next').trim(), a * 0.8);
  }
}

/* ---------------- コマの操作 ---------------- */
async function showFrame(i){
  state.cur = Math.max(0, Math.min(i, state.frames.length - 1));
  const f = state.frames[state.cur];
  pctx.globalCompositeOperation = 'source-over';
  pctx.clearRect(0, 0, W, H);
  if (f.img) pctx.drawImage(f.img, 0, 0, W, H);
  drawOnion();
  renderStrip();
  saveMeta();
}
async function addFrame(copy){
  const src = state.frames[state.cur];
  const f = { id: uid(), blob: copy ? src.blob : null, img: copy ? src.img : null };
  state.frames.splice(state.cur + 1, 0, f);
  if (f.blob) await idbPut('frames', f.id, f.blob).catch(()=>{});
  await showFrame(state.cur + 1);
}
async function delFrame(){
  const f = state.frames[state.cur];
  if (state.frames.length === 1) {                 // 最後の1枚は中身だけ消す
    f.blob = null; f.img = null;
    await idbDel('frames', f.id);
  } else {
    state.frames.splice(state.cur, 1);
    await idbDel('frames', f.id);
    if (state.cur >= state.frames.length) state.cur = state.frames.length - 1;
  }
  undoStack = []; redoStack = []; refreshUndo();
  await showFrame(state.cur);
}
async function move(dir){
  const i = state.cur, j = i + dir;
  if (j < 0 || j >= state.frames.length) return;
  [state.frames[i], state.frames[j]] = [state.frames[j], state.frames[i]];
  await showFrame(j);
}

/* ---------------- タイムシート ---------------- */
function renderStrip(){
  const strip = $('#strip');
  strip.innerHTML = '';
  state.frames.forEach((f, i) => {
    const cell = document.createElement('div');
    cell.className = 'cell' + (i === state.cur ? ' on' : '');
    const c = document.createElement('canvas'); c.width = 208; c.height = 117;
    cell.appendChild(c);
    const no = document.createElement('div');
    no.className = 'no'; no.textContent = String(i + 1).padStart(3, '0');
    cell.appendChild(no);
    cell.addEventListener('click', () => { if (!state.playing) showFrame(i); });
    strip.appendChild(cell);
    paintThumb(c, f);
  });
  $('#count').textContent = state.frames.length + ' コマ';
  const on = strip.querySelector('.cell.on');
  if (on) on.scrollIntoView({ block: 'nearest', inline: 'nearest' });
}
function paintThumb(c, f){
  const x = c.getContext('2d');
  x.fillStyle = '#fff'; x.fillRect(0, 0, c.width, c.height);
  if (f.img) x.drawImage(f.img, 0, 0, c.width, c.height);
}
function drawThumb(i){
  const cell = $('#strip').children[i];
  if (cell) paintThumb(cell.querySelector('canvas'), state.frames[i]);
}

/* ---------------- 取り消し / やり直し ---------------- */
function refreshUndo(){
  $('#undo').disabled = undoStack.length === 0;
  $('#redo').disabled = redoStack.length === 0;
}
async function restore(entry, otherStack){
  const i = state.frames.findIndex(f => f.id === entry.id);
  if (i < 0) return;
  const f = state.frames[i];
  otherStack.push({ id: f.id, blob: f.blob });
  f.blob = entry.blob;
  f.img = await toImg(entry.blob);
  if (entry.blob) await idbPut('frames', f.id, entry.blob).catch(()=>{});
  else await idbDel('frames', f.id);
  if (i === state.cur) await showFrame(i); else drawThumb(i);
  drawThumb(i); refreshUndo();
}
$('#undo').onclick = () => { const e = undoStack.pop(); if (e) restore(e, redoStack); };
$('#redo').onclick = () => { const e = redoStack.pop(); if (e) restore(e, undoStack); };

/* ---------------- 再生 ---------------- */
function play(){
  if (state.frames.length < 2) return;
  state.playing = true;
  $('#play').textContent = '■ 停止';
  $('#play').classList.add('on');
  player.hidden = false;
  let i = 0;
  const step = () => {
    if (!state.playing) return;
    const f = state.frames[i];
    plctx.fillStyle = '#fff'; plctx.fillRect(0, 0, W, H);
    if (f.img) plctx.drawImage(f.img, 0, 0, W, H);
    i = (i + 1) % state.frames.length;
    playTimer = setTimeout(step, 1000 / state.fps);
  };
  step();
}
function stop(){
  state.playing = false; clearTimeout(playTimer);
  player.hidden = true;
  $('#play').textContent = '▶ 再生';
  $('#play').classList.remove('on');
}
$('#play').onclick = () => state.playing ? stop() : play();

/* ---------------- ツールUI ---------------- */
const COLORS = ['#1a1a1a', '#ffffff', '#e35b4a', '#f0a12e', '#f4d03f',
                '#5bbf5b', '#4a8ee3', '#9b6be3', '#8a5a3c', '#9aa3b0'];
function buildSwatches(){
  const box = $('#swatches'); box.innerHTML = '';
  COLORS.forEach(c => {
    const b = document.createElement('button');
    b.className = 'sw' + (c === state.color ? ' on' : '');

    box.appendChild(b);
  });
}
function syncTools(){
  $('#pen').classList.toggle('on', state.tool === 'pen');
  $('#eraser').classList.toggle('on', state.tool === 'eraser');
  [...$('#swatches').children].forEach((b, i) => b.classList.toggle('on', COLORS[i] === state.color));

  $('#onionBtn').classList.toggle('on', state.onion > 0);

  $('#pencilOnly').classList.toggle('on', state.pencilOnly);
}
$('#pen').onclick    = () => { state.tool = 'pen'; syncTools(); saveMeta(); };
$('#eraser').onclick = () => { state.tool = 'eraser'; syncTools(); saveMeta(); };
$('#size').oninput   = e => { state.size = +e.target.value; $('#sizeVal').textContent = state.size; saveMeta(); };
$('#custom').oninput = e => { state.color = e.target.value; state.tool = 'pen'; syncTools(); saveMeta(); };
$('#fps').oninput    = e => { state.fps = +e.target.value; $('#fpsVal').textContent = state.fps; saveMeta(); };
$('#onionBtn').onclick   = () => { state.onion = (state.onion + 1) % 3; syncTools(); drawOnion(); saveMeta(); };
$('#pencilOnly').onclick = () => { state.pencilOnly = !state.pencilOnly; syncTools(); saveMeta(); };
$('#add').onclick   = () => !state.playing && addFrame(false);
$('#dup').onclick   = () => !state.playing && addFrame(true);
$('#del').onclick   = () => !state.playing && delFrame();
$('#left').onclick  = () => !state.playing && move(-1);
$('#right').onclick = () => !state.playing && move(1);

$('#menuBtn').onclick   = () => $('#menuPop').hidden = false;
$('#menuClose').onclick = () => $('#menuPop').hidden = true;
$('#clearAll').onclick  = async () => {
  if (!confirm('すべてのコマを削除して新規作成します。よろしいですか？')) return;
  await idbClear('frames'); await idbClear('meta');

};

/* ---------------- 書き出し ---------------- */
function progress(title, pct, text){
  $('#progPop').hidden = false;
  $('#progTitle').textContent = title;
  $('#barFill').style.width = Math.round(pct * 100) + '%';
  $('#progText').textContent = text;
  return new Promise(r => setTimeout(r, 0));   // 画面を描き直す隙間
}
const doneProg = () => { $('#progPop').hidden = true; };

function frameCanvas(f, scale){
  const c = document.createElement('canvas');
  c.width = Math.max(2, Math.round(W * scale)); c.height = Math.max(2, Math.round(H * scale));
  const x = c.getContext('2d');
  x.fillStyle = '#fff'; x.fillRect(0, 0, c.width, c.height);
  if (f.img) x.drawImage(f.img, 0, 0, c.width, c.height);
  return c;
}
async function saveOut(blob, name, type){
  try {
    const file = new File([blob], name, { type });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: name });
      return;
    }
  } catch (e) {
    if (e && e.name === 'AbortError') return;
  }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = name;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 2000);
}

/* ---- ZIP（無圧縮・storeメソッド） ---- */
const CRC = (() => { const t = new Uint32Array(256);
  for (let n = 0; n < 256; n++) { let c = n; for (let k = 0; k < 8; k++) c = c & 1 ? 0xEDB88320 ^ (c >>> 1) : c >>> 1; t[n] = c >>> 0; }
  return t; })();
function crc32(u8){ let c = 0xFFFFFFFF; for (let i = 0; i < u8.length; i++) c = CRC[(c ^ u8[i]) & 255] ^ (c >>> 8); return (c ^ 0xFFFFFFFF) >>> 0; }
function makeZip(files){
  const enc = new TextEncoder(), parts = [], central = [];
  let offset = 0;
  for (const f of files) {
    const name = enc.encode(f.name), crc = crc32(f.data), size = f.data.length;
    const lh = new Uint8Array(30 + name.length), d1 = new DataView(lh.buffer);
    d1.setUint32(0, 0x04034b50, true); d1.setUint16(4, 20, true);
    d1.setUint32(14, crc, true); d1.setUint32(18, size, true); d1.setUint32(22, size, true);
    d1.setUint16(26, name.length, true);
    lh.set(name, 30);
    parts.push(lh, f.data);
    const cd = new Uint8Array(46 + name.length), d2 = new DataView(cd.buffer);
    d2.setUint32(0, 0x02014b50, true); d2.setUint16(4, 20, true); d2.setUint16(6, 20, true);
    d2.setUint32(16, crc, true); d2.setUint32(20, size, true); d2.setUint32(24, size, true);
    d2.setUint16(28, name.length, true); d2.setUint32(42, offset, true);
    cd.set(name, 46);
    central.push(cd);
    offset += lh.length + size;
  }
  const cdSize = central.reduce((a, b) => a + b.length, 0);
  const eo = new Uint8Array(22), d3 = new DataView(eo.buffer);
  d3.setUint32(0, 0x06054b50, true);
  d3.setUint16(8, files.length, true); d3.setUint16(10, files.length, true);
  d3.setUint32(12, cdSize, true); d3.setUint32(16, offset, true);
  return new Blob([...parts, ...central, eo], { type: 'application/zip' });
}
async function exportPng(){
  const scale = +$('#expScale').value;
  $('#expPop').hidden = true;
  const files = [];
  for (let i = 0; i < state.frames.length; i++) {
    await progress('PNG連番を書き出し中', i / state.frames.length, `${i + 1} / ${state.frames.length} コマ`);
    const c = frameCanvas(state.frames[i], scale);
    const blob = await new Promise(r => c.toBlob(r, 'image/png'));
    files.push({ name: String(i + 1).padStart(4, '0') + '.png', data: new Uint8Array(await blob.arrayBuffer()) });
  }
  await progress('PNG連番を書き出し中', 0.98, 'ZIPにまとめています…');
  const zip = makeZip(files);
  doneProg();
  await saveOut(zip, `komadori_${stamp()}.zip`, 'application/zip');
}
const stamp = () => {
  const d = new Date(), p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}${p(d.getMonth() + 1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}`;
};

/* ---- GIF（自前エンコーダ） ---- */
class Buf {
  constructor(){ this.a = new Uint8Array(1 << 16); this.n = 0; }
  need(k){ if (this.n + k <= this.a.length) return;
    let len = this.a.length; while (len < this.n + k) len *= 2;
    const b = new Uint8Array(len); b.set(this.a.subarray(0, this.n)); this.a = b; }
  b(v){ this.need(1); this.a[this.n++] = v & 255; }
  w(v){ this.b(v); this.b(v >> 8); }
  s(str){ for (let i = 0; i < str.length; i++) this.b(str.charCodeAt(i)); }
  put(u8){ this.need(u8.length); this.a.set(u8, this.n); this.n += u8.length; }
  out(){ return this.a.subarray(0, this.n); }
}
function lzw(minCodeSize, px){
  const clear = 1 << minCodeSize, eoi = clear + 1;
  let codeSize = minCodeSize + 1, maxCode = (1 << codeSize) - 1, next = clear + 2;
  let dict = new Map(), cur = 0, bits = 0;
  const o = new Buf();
  const emit = code => {
    cur |= code << bits; bits += codeSize;
    while (bits >= 8) { o.b(cur & 255); cur >>>= 8; bits -= 8; }
    if (next > maxCode && codeSize < 12) { codeSize++; maxCode = (1 << codeSize) - 1; }
  };
  emit(clear);
  let prefix = px[0];
  for (let i = 1; i < px.length; i++) {
    const c = px[i], key = (prefix << 8) | c, v = dict.get(key);
    if (v !== undefined) { prefix = v; continue; }
    emit(prefix);
    if (next < 4096) dict.set(key, next++);
    else { emit(clear); dict = new Map(); codeSize = minCodeSize + 1; maxCode = (1 << codeSize) - 1; next = clear + 2; }
    prefix = c;
  }
  emit(prefix); emit(eoi);
  if (bits > 0) o.b(cur & 255);
  return o.out();
}
async function exportGif(){
  const scale = +$('#expScale').value;
  $('#expPop').hidden = true;
  const n = state.frames.length;

  // 1コマ分だけを使い回す作業用キャンバス（メモリを節約するため）
  const work = document.createElement('canvas');
  work.width  = Math.max(2, Math.round(W * scale));
  work.height = Math.max(2, Math.round(H * scale));
  const w = work.width, h = work.height, wctx = work.getContext('2d', { willReadFrequently: true });
  const pixels = f => {
    wctx.fillStyle = '#fff'; wctx.fillRect(0, 0, w, h);
    if (f.img) wctx.drawImage(f.img, 0, 0, w, h);
    return wctx.getImageData(0, 0, w, h).data;
  };

  // 1回目: 使われている色を数えて、多い順に256色をパレットにする
  const hist = new Map();
  for (let i = 0; i < n; i++) {
    await progress('GIFを書き出し中', 0.05 + 0.25 * i / n, `色を数えています ${i + 1} / ${n}`);
    const d = pixels(state.frames[i]);
    for (let j = 0; j < d.length; j += 4) {
      const k = ((d[j] >> 3) << 10) | ((d[j + 1] >> 3) << 5) | (d[j + 2] >> 3);
      hist.set(k, (hist.get(k) || 0) + 1);
    }
  }
  const ex = b => (b << 3) | (b >> 2);
  const entries = [...hist.entries()].sort((a, b) => b[1] - a[1]).slice(0, 256);
  const pal = entries.map(([k]) => [ex((k >> 10) & 31), ex((k >> 5) & 31), ex(k & 31)]);
  let P = 2; while (P < pal.length) P <<= 1; if (P < 4) P = 4;
  const mcs = Math.round(Math.log2(P));
  const cache = new Int16Array(32768).fill(-1);
  const idxFor = k => {
    let v = cache[k]; if (v >= 0) return v;
    const r = ex((k >> 10) & 31), g = ex((k >> 5) & 31), b = ex(k & 31);
    let best = 0, bd = Infinity;
    for (let i = 0; i < pal.length; i++) {
      const dr = r - pal[i][0], dg = g - pal[i][1], db = b - pal[i][2], dd = dr * dr + dg * dg + db * db;
      if (dd < bd) { bd = dd; best = i; }
    }
    cache[k] = best; return best;
  };

  const g = new Buf();
  g.s('GIF89a'); g.w(w); g.w(h);
  g.b(0x80 | 0x70 | (mcs - 1)); g.b(0); g.b(0);
  for (let i = 0; i < P; i++) { const c = pal[i] || [0, 0, 0]; g.b(c[0]); g.b(c[1]); g.b(c[2]); }
  g.b(0x21); g.b(0xFF); g.b(11); g.s('NETSCAPE2.0'); g.b(3); g.b(1); g.w(0); g.b(0);   // 無限ループ

  const delay = Math.max(2, Math.round(100 / state.fps));
  for (let f = 0; f < n; f++) {
    await progress('GIFを書き出し中', 0.3 + 0.65 * f / n, `変換中 ${f + 1} / ${n} コマ`);
    g.b(0x21); g.b(0xF9); g.b(4); g.b(0x04); g.w(delay); g.b(0); g.b(0);   // 画像制御
    g.b(0x2C); g.w(0); g.w(0); g.w(w); g.w(h); g.b(0);                     // 画像位置
    const d = pixels(state.frames[f]), idx = new Uint8Array(w * h);
    for (let i = 0, j = 0; i < d.length; i += 4, j++)
      idx[j] = idxFor(((d[i] >> 3) << 10) | ((d[i + 1] >> 3) << 5) | (d[i + 2] >> 3));
    g.b(mcs);
    const bytes = lzw(mcs, idx);
    for (let i = 0; i < bytes.length; i += 255) {
      const chunk = bytes.subarray(i, i + 255);
      g.b(chunk.length); g.put(chunk);
    }
    g.b(0);
  }
  g.b(0x3B);
  doneProg();
  await saveOut(new Blob([g.out()], { type: 'image/gif' }), `komadori_${stamp()}.gif`, 'image/gif');
}
$('#expPng').onclick = () => exportPng().catch(err => { doneProg(); alert('書き出しに失敗しました: ' + err); });
$('#expGif').onclick = () => exportGif().catch(err => { doneProg(); alert('書き出しに失敗しました: ' + err); });

/* ---------------- 起動 ---------------- */
async function boot(){
  db = await openDB();
  const meta = await idbGet('meta', 'project').catch(() => null);
  if (meta && meta.order && meta.order.length) {
    state.fps = meta.fps ?? 12;
    state.onion = meta.onion ?? 1;
    state.size = meta.size ?? 6;
    state.color = meta.color ?? '#1a1a1a';
    state.pencilOnly = !!meta.pencilOnly;
    for (const id of meta.order) {
      const blob = await idbGet('frames', id).catch(() => null);
      state.frames.push({ id, blob: blob || null, img: await toImg(blob) });
    }
    state.cur = Math.min(meta.cur ?? 0, state.frames.length - 1);
  } else {
    state.frames.push({ id: uid(), blob: null, img: null });
  }
  buildSwatches(); syncTools(); refreshUndo(); fit();
  await showFrame(state.cur);
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
}
boot();
